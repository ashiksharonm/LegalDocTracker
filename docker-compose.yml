version: "3.9"

services:
  # -----------------------------------------------------------------------
  # PostgreSQL
  # -----------------------------------------------------------------------
  db:
    image: postgres:15-alpine
    container_name: legaldoctracker_db
    environment:
      POSTGRES_DB: ${DB_NAME:-legaldoctracker}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-legaldoctracker}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------------------
  # MongoDB
  # -----------------------------------------------------------------------
  mongo:
    image: mongo:7.0
    container_name: legaldoctracker_mongo
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME:-legaldoctracker}
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------------------
  # Web (Django + Gunicorn)
  # -----------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: legaldoctracker_web
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application
               --bind 0.0.0.0:8000
               --workers 4
               --timeout 90
               --access-logfile -
               --error-logfile -"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
      DB_HOST: db
      MONGO_URI: mongodb://mongo:27017
    depends_on:
      db:
        condition: service_healthy
      mongo:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  mongo_data:
  static_volume:
  media_volume:
