name: LegalDocTracker CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  DJANGO_SETTINGS_MODULE: config.settings.local
  DJANGO_SECRET_KEY: ci-secret-key-not-for-production
  DB_NAME: legaldoctracker_test
  DB_USER: postgres
  DB_PASSWORD: postgres
  DB_HOST: localhost
  DB_PORT: "5432"
  MONGO_URI: mongodb://localhost:27017
  MONGO_DB_NAME: legaldoctracker_test
  ALLOWED_HOSTS: localhost,127.0.0.1

jobs:
  # =========================================================================
  # Job 1 — Lint
  # =========================================================================
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint dependencies
        run: |
          pip install --upgrade pip
          pip install flake8 flake8-docstrings

      - name: Run flake8
        run: |
          flake8 . \
            --max-line-length=120 \
            --exclude=.git,__pycache__,migrations,venv,.venv \
            --extend-ignore=D100,D101,D102,D104,D107,E501

  # =========================================================================
  # Job 2 — Tests
  # =========================================================================
  test:
    name: Tests (pytest-django)
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: legaldoctracker_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      mongodb:
        image: mongo:7.0
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Run pytest
        run: |
          pytest contracts/tests/ \
            -v \
            --tb=short \
            --junit-xml=test-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml
          retention-days: 7

  # =========================================================================
  # Job 3 — Docker build
  # =========================================================================
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          tags: legaldoctracker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: runtime
