[flake8]
max-line-length = 120
exclude =
    .git,
    __pycache__,
    migrations,
    venv,
    .venv,
    staticfiles
extend-ignore =
    # Missing docstrings — relaxed for model/migration boilerplate
    D100,D101,D102,D103,D104,D107,
    # Line too long (handled by max-line-length)
    E501,
    # Allow star imports in settings
    F401,F403,F811
per-file-ignores =
    config/settings/*.py: F401,F403,F405,F811
    contracts/tests/*.py: D,S101
